<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Food as Medicine — Build Your Meal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: #f7f5f2; font-family: 'Outfit', sans-serif; color: #1e1e1e; }
  button { font-family: 'Outfit', sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #222; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
  .loading { text-align: center; padding: 60px 20px; font-size: 14px; color: #999; font-family: 'Outfit', sans-serif; }
  .error   { text-align: center; padding: 60px 20px; font-size: 14px; color: #c44a4a; font-family: 'Outfit', sans-serif; }
</style>
</head>
<body>
<div id="root"><div class="loading">Loading...</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const C = {
  fat: "#c44a4a", carbs: "#e8913a", protein: "#4a9c6d",
  fiber: "#7a5aa6", sat: "#c44a4a", added: "#c44a4a",
  caffeine: "#6b4a2a", sodium: "#8a7a6a", whole: "#2d8a56",
};

function formatPortion(qty, unit) {
  return qty === 1 ? `1 ${unit}` : `${qty} × ${unit}`;
}

// ─── MACRO BAR ────────────────────────────────────────────────────
function MacroBar({ cal, fat, satFat, carbs, fiber, sugar, addedSugar, protein, refinedCarbs: rawRefined, small }) {
  if (cal <= 0) return null;
  const unsatFat   = Math.max(0, fat - satFat);
  const naturalSug = Math.max(0, sugar - addedSugar);
  const complexC   = Math.max(0, carbs - sugar - fiber);
  const refinedC   = Math.min(complexC, rawRefined || 0);
  const wholeC     = Math.max(0, complexC - refinedC);
  const h = small ? 12 : 20;
  const uid = `mb${Math.random().toString(36).slice(2,6)}`;

  const segments = [
    { sub: "unsat",   g: unsatFat,   kcal: unsatFat*9,   label: "Unsat Fat"      },
    { sub: "sat",     g: satFat,     kcal: satFat*9,     label: "Sat Fat"        },
    { sub: "whole",   g: wholeC,     kcal: wholeC*4,     label: "Whole Starch"   },
    { sub: "refined", g: refinedC,   kcal: refinedC*4,   label: "Refined Starch" },
    { sub: "fiber",   g: fiber,      kcal: fiber*2,      label: "Fiber"          },
    { sub: "natSug",  g: naturalSug, kcal: naturalSug*4, label: "Natural Sugar"  },
    { sub: "addSug",  g: addedSugar, kcal: addedSugar*4, label: "Added Sugar"    },
    { sub: "protein", g: protein,    kcal: protein*4,    label: "Protein"        },
  ].filter(s => s.g > 0.05);

  const total = segments.reduce((a,s) => a + s.kcal, 0) || 1;

  const FILLS = {
    unsat:   { fill: C.fat+"99",       legend: C.fat+"99",                                                                   color: C.fat     },
    sat:     { fill:`url(#sat${uid})`, legend:`repeating-linear-gradient(45deg,${C.fat} 0 2px,#8a2a2a 2px 4px)`,            color: C.fat     },
    whole:   { fill: C.carbs,          legend: C.carbs,                                                                      color: C.carbs   },
    refined: { fill:`url(#ref${uid})`, legend:`repeating-linear-gradient(45deg,${C.carbs} 0 2px,#b05a10 2px 4px)`,          color: C.carbs   },
    fiber:   { fill: C.fiber,          legend: C.fiber,                                                                      color: C.fiber   },
    natSug:  { fill:`url(#nat${uid})`, legend:`repeating-linear-gradient(45deg,${C.carbs} 0 2px,#f7d06b 2px 4px)`,          color: C.carbs   },
    addSug:  { fill:`url(#add${uid})`, legend:`repeating-linear-gradient(-45deg,${C.carbs} 0 2px,${C.added} 2px 4px)`,      color: C.added   },
    protein: { fill: C.protein,        legend: C.protein,                                                                    color: C.protein },
  };

  let x = 0;
  const rects = segments.map((s, i) => {
    const w = (s.kcal / total) * 100;
    const rx = x; x += w;
    return <rect key={i} x={rx} y="0" width={Math.max(w,0)} height={h} fill={FILLS[s.sub].fill}>
      <title>{s.label}: {s.g.toFixed(1)}g ({Math.round((s.kcal/total)*100)}% cal)</title>
    </rect>;
  });

  return (
    <div>
      <svg width="100%" height={h} viewBox={`0 0 100 ${h}`} preserveAspectRatio="none"
           style={{borderRadius: h/2, display:"block"}}>
        <defs>
          <pattern id={`sat${uid}`} patternUnits="userSpaceOnUse" width="3" height={h} patternTransform="rotate(45)">
            <rect width="3" height={h} fill={C.fat}/><rect width="1.5" height={h} fill="#8a2a2a"/>
          </pattern>
          <pattern id={`ref${uid}`} patternUnits="userSpaceOnUse" width="3" height={h} patternTransform="rotate(45)">
            <rect width="3" height={h} fill={C.carbs}/><rect width="1.5" height={h} fill="#b05a10"/>
          </pattern>
          <pattern id={`nat${uid}`} patternUnits="userSpaceOnUse" width="3" height={h} patternTransform="rotate(45)">
            <rect width="3" height={h} fill={C.carbs}/><rect width="1.5" height={h} fill="#f7d06b"/>
          </pattern>
          <pattern id={`add${uid}`} patternUnits="userSpaceOnUse" width="3" height={h} patternTransform="rotate(-45)">
            <rect width="3" height={h} fill={C.carbs}/><rect width="1.5" height={h} fill={C.added}/>
          </pattern>
          <clipPath id={`cl${uid}`}><rect x="0" y="0" width="100" height={h} rx={h/2} ry={h/2}/></clipPath>
        </defs>
        <g clipPath={`url(#cl${uid})`}>
          <rect width="100" height={h} fill="#2a2a2a"/>
          {rects}
        </g>
      </svg>
      {!small && (
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:6,justifyContent:"center",fontSize:9}}>
          {segments.map((s,i) => {
            const f = FILLS[s.sub];
            return (
              <span key={i} style={{display:"flex",alignItems:"center",gap:4,color:f.color,fontWeight:600}}>
                <span style={{display:"inline-block",width:12,height:9,borderRadius:2,background:f.legend}}/>
                {s.label} {s.g.toFixed(1)}g <span style={{color:"#666",fontWeight:400}}>({Math.round((s.kcal/total)*100)}%)</span>
              </span>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── REPORT ───────────────────────────────────────────────────────
function computeReport(quantities, allItems, daily) {
  const KEYS = ["cal","fat","satFat","carbs","fiber","sugar","addedSugar","protein","sodium","refinedCarbs","caffeine"];
  const totals = {}; KEYS.forEach(k => totals[k] = 0);
  let hasHyd=false, hasTrans=false, hasAnimal=false;
  const processedC=[], activeItems=[];
  let wholeCal=0;

  Object.entries(quantities).forEach(([id,qty]) => {
    const item = allItems.find(i => i.id===id);
    if (!item) return;
    activeItems.push({item,qty});
    KEYS.forEach(k => { totals[k] += (item[k]||0)*qty; });
    if (item.hydrogenatedOil) hasHyd=true;
    if (item.transFatRisk)    hasTrans=true;
    if (item.animal)          hasAnimal=true;
    if (item.processed>=2 && item.processedReason) processedC.push({name:item.name,qty,score:item.processed,reason:item.processedReason});
    wholeCal += (item.cal*qty)*item.wholeFood;
  });
  processedC.sort((a,b) => b.score-a.score);
  const wholePct = totals.cal>0 ? (wholeCal/totals.cal)*100 : 0;

  const dangers = [
    { key:"addedSugar", label:"Added Sugar",   value:totals.addedSugar,   max:daily.addedSugar,   unit:"g",  color:C.added,    maxLabel:"daily limit (36g)",          context: totals.addedSugar<=4?"Minimal":totals.addedSugar<=12?"Notable insulin response":totals.addedSugar<=24?"Liver fat production active":"Approaching daily limit" },
    { key:"satFat",     label:"Saturated Fat", value:totals.satFat,       max:daily.satFat,       unit:"g",  color:C.sat,      maxLabel:"daily limit (13g)",          context: totals.satFat<=3?"Low":totals.satFat<=6?"Moderate":totals.satFat<=10?"LDL increasing":"At daily limit" },
    { key:"refined",    label:"Refined Carbs", value:totals.refinedCarbs, max:daily.refinedCarbs, unit:"g",  color:C.carbs,    maxLabel:"high-meal threshold (50g)",   context: totals.refinedCarbs<=5?"Minimal":totals.refinedCarbs<=20?"Glucose spike likely":"Behaves like pure sugar" },
    { key:"caffeine",   label:"Caffeine",      value:totals.caffeine,     max:daily.caffeine,     unit:"mg", color:C.caffeine, maxLabel:"FDA ceiling (400mg)",         context: totals.caffeine===0?"None":totals.caffeine<=100?"Mild":totals.caffeine<=200?"Moderate — cortisol elevated":totals.caffeine<=300?"High — sleep impact likely":"Near daily ceiling" },
    { key:"sodium",     label:"Sodium",        value:totals.sodium,       max:daily.sodium,       unit:"mg", color:C.sodium,   maxLabel:"daily max (2300mg)",         context: totals.sodium<=200?"Low":totals.sodium<=600?"Moderate":totals.sodium<=1000?"High for one meal":"Very high — BP/retention" },
  ];

  const flags = [];
  if (hasHyd)   flags.push({ key:"hyd",    label:"Hydrogenated Oils", color:C.fat,    detail:"Industrially hardened fats. Structure foreign to human metabolism.",                                                              items:processedC.filter(c=>c.reason.toLowerCase().includes("hydrogenated")) });
  if (hasTrans) flags.push({ key:"trans",  label:"Trans Fat Risk",    color:C.fat,    detail:"Hydrogenated oils + mono/diglycerides may contain trans fats below 0.5g labeling threshold. No safe intake level (WHO).",         items:processedC.filter(c=>c.reason.toLowerCase().includes("trans")) });
  if (processedC.some(c=>c.score>=3)) flags.push({ key:"upf", label:"Ultra-Processed", color:"#d47333", detail:"Industrial ingredients detected. Sorted by severity:",                                                           items:processedC });
  if (hasAnimal) flags.push({ key:"animal", label:"Animal Products",  color:"#a07050", detail:"Contains dairy or other animal-derived ingredients.",                                                                             items:activeItems.filter(({item})=>item.animal).map(({item,qty})=>({name:item.name,qty,score:1,reason:"Contains dairy or other animal-derived ingredients"})) });

  const positives = [
    { key:"fiber",   label:"Fiber",        value:totals.fiber,  target:daily.fiber,   unit:"g", color:C.fiber,   maxLabel:"daily target (28g)",  context: totals.fiber>=8?"Strong — buffers glucose, feeds gut":totals.fiber>=3?"Some":"Low — glucose unbuffered" },
    { key:"protein", label:"Protein",      value:totals.protein,target:daily.protein, unit:"g", color:C.protein, maxLabel:"daily target (64g)",  context: totals.protein>=15?"Strong — satiety":totals.protein>=8?"Moderate":"Low — hunger returns fast" },
    { key:"whole",   label:"Whole Food %", value:wholePct,      target:100,           unit:"%", color:C.whole,   maxLabel:"100% whole-food",     context: wholePct>=70?"Mostly whole foods — recognized by your body":wholePct>=40?"Mixed":"Highly processed meal" },
  ];

  // Density-based scoring (quality of food, not quantity)
  const p = v => totals.cal>0 ? (v/totals.cal)*100 : 0;
  let score = 60;
  const asd=p(totals.addedSugar), sfd=p(totals.satFat), rcd=p(totals.refinedCarbs), fbd=p(totals.fiber), prd=p(totals.protein);
  if (asd>1)        score -= Math.min(25,(asd-1)*6);
  if (sfd>1)        score -= Math.min(15,(sfd-1)*5);
  if (rcd>3)        score -= Math.min(20,(rcd-3)*2);
  if (hasTrans)     score -= 12;
  if (hasHyd)       score -= 6;
  if (wholePct<30)  score -= 8; else if (wholePct<60) score -= 3;
  if (fbd>=2.5)     score += 10; else if (fbd>=1.5) score += 5;
  if (prd>=4)       score += 5;
  if (wholePct>=80) score += 8;
  if (!hasHyd && !hasTrans && asd<1) score += 5;
  score = Math.max(0, Math.min(100, Math.round(score)));

  let grade, gColor, gLabel;
  if      (score>=80) { grade="A"; gColor="#2d8a56"; gLabel="Clean fuel";    }
  else if (score>=65) { grade="B"; gColor="#6b9e7a"; gLabel="Decent";        }
  else if (score>=50) { grade="C"; gColor="#c4943a"; gLabel="Mediocre";      }
  else if (score>=35) { grade="D"; gColor="#d47333"; gLabel="Damage mode";   }
  else                { grade="F"; gColor="#c44a4a"; gLabel="Metabolic hit"; }

  return { totals, dangers, flags, positives, score, grade, gradeColor:gColor, gradeLabel:gLabel };
}

// ─── COMPONENTS ───────────────────────────────────────────────────
function MetricBar({ d, isPositive }) {
  const pct = Math.min(100, (d.value / (isPositive ? d.target : d.max)) * 100);
  const warn = !isPositive && pct > 60;
  const barC = isPositive
    ? (pct>=75 ? d.color : pct>=40 ? "#888" : "#555")
    : (pct>75  ? d.color : pct>50  ? "#c4943a" : "#4a7a5a");
  const highlight = warn || (isPositive && pct>=75);
  return (
    <div style={{marginBottom:7}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2,alignItems:"baseline"}}>
        <span style={{fontWeight:600, color: highlight ? d.color : "#888"}}>{d.label}</span>
        <span style={{fontWeight:700, color: highlight ? d.color : "#666", fontSize:11}}>{d.value.toFixed(d.unit==="mg"?0:1)}{d.unit}</span>
      </div>
      <div style={{height:5,backgroundColor:"#333",borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,borderRadius:3,backgroundColor:barC,transition:"width 0.3s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:8,marginTop:1}}>
        <span style={{color: highlight ? d.color : "#555", fontWeight:500}}>{d.context}</span>
        <span style={{color:"#444",fontStyle:"italic"}}>{d.maxLabel}</span>
      </div>
    </div>
  );
}

function QtyStepper({ qty, max, unit, onSet, dark }) {
  const c  = dark ? "#999" : "#555";
  const bg = dark ? "#333" : "#eae7e2";
  return (
    <div style={{display:"flex",alignItems:"center",borderRadius:6,overflow:"hidden",backgroundColor:bg,flexShrink:0}}
         onClick={e => e.stopPropagation()}>
      <button onClick={() => onSet(Math.max(0, qty-1))}
              style={{width:28,height:28,border:"none",backgroundColor:"transparent",color:c,fontSize:18,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
      <div style={{minWidth:38,textAlign:"center",fontWeight:700,color:dark?"#eee":"#333",lineHeight:1.1,padding:"0 2px"}}>
        <div style={{fontSize:14}}>{qty}</div>
        <div style={{fontSize:8,color:dark?"#777":"#aaa",fontWeight:500}}>{unit}</div>
      </div>
      <button onClick={() => onSet(Math.min(max, qty+1))}
              style={{width:28,height:28,border:"none",backgroundColor:"transparent",color:c,fontSize:18,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────
function App() {
  const [quantities,    setQuantities]    = useState({});
  const [expandedNote,  setExpandedNote]  = useState(null);
  const [showPanel,     setShowPanel]     = useState(false);
  const [expandedFlag,  setExpandedFlag]  = useState(null);
  const [appData,       setAppData]       = useState(null);
  const [loadError,     setLoadError]     = useState(null);

  useEffect(() => {
    fetch('data.json')
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d  => setAppData(d))
      .catch(e => setLoadError(e.message));
  }, []);

  if (loadError) return <div className="error">Could not load data.json: {loadError}<br/><small>Run via a local server: python -m http.server 8000</small></div>;
  if (!appData)  return <div className="loading">Loading…</div>;

  const setQty = (id, n) => setQuantities(prev => {
    const next = {...prev};
    if (n <= 0) delete next[id]; else next[id] = n;
    return next;
  });

  const allItems   = appData.CATEGORIES.flatMap(c => c.items);
  const activeCount = Object.keys(quantities).length;
  const report     = activeCount > 0 ? computeReport(quantities, allItems, appData.DAILY) : null;

  return (
    <div style={{fontFamily:"'Outfit',sans-serif",maxWidth:720,margin:"0 auto",padding:"24px 16px 200px",backgroundColor:"#f7f5f2",minHeight:"100vh"}}>

      {/* HEADER */}
      <div style={{marginBottom:24}}>
        <div style={{fontSize:9,letterSpacing:2.5,textTransform:"uppercase",color:"#bbb",fontWeight:700}}>FOOD AS MEDICINE</div>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,margin:"4px 0",lineHeight:1.1,color:"#1e1e1e"}}>Build Your Meal</h1>
        <p style={{fontSize:12,color:"#999",margin:0}}>Quality score grades the food, not the portion. Bars anchored to daily limits.</p>
        {activeCount > 0 && (
          <button onClick={() => { setQuantities({}); setShowPanel(false); }}
                  style={{marginTop:8,border:"none",backgroundColor:"#e8e5e0",borderRadius:4,padding:"4px 12px",fontSize:10,color:"#999",cursor:"pointer",fontWeight:600}}>
            Clear all
          </button>
        )}
      </div>

      {/* CATEGORIES */}
      {appData.CATEGORIES.map((cat, ci) => (
        <div key={ci} style={{marginBottom:22}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,borderBottom:"1px solid #e8e5e0",paddingBottom:6}}>
            <span style={{fontSize:20}}>{cat.icon}</span>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#1e1e1e"}}>{cat.name}</div>
              <div style={{fontSize:10,color:"#aaa"}}>{cat.desc}</div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {cat.items.map(item => {
              const qty    = quantities[item.id] || 0;
              const active = qty > 0;
              const isOpen = expandedNote === item.id;
              return (
                <div key={item.id}>
                  {/* ROW */}
                  <div style={{display:"flex",alignItems:"center",gap:8,borderRadius:8,padding:"8px 10px",
                               backgroundColor:active?"#1e1e1e":"#fff",
                               boxShadow:active?"none":"0 1px 3px rgba(0,0,0,0.04)",transition:"all 0.15s"}}>
                    <QtyStepper qty={qty} max={item.max} unit={item.unit} onSet={n => setQty(item.id, n)} dark={active}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,lineHeight:1.2,color:active?"#eee":"#333",display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                        {item.name}
                        {item.hydrogenatedOil && <span style={{fontSize:7,backgroundColor:C.fat+"33",color:C.fat,padding:"1px 4px",borderRadius:2,fontWeight:800}}>HYD</span>}
                        {item.processed>=3     && <span style={{fontSize:7,backgroundColor:"#d4733333",color:"#d47333",padding:"1px 4px",borderRadius:2,fontWeight:800}}>UPF</span>}
                        {item.animal           && <span style={{fontSize:7,backgroundColor:"#a0705033",color:"#a07050",padding:"1px 4px",borderRadius:2,fontWeight:800}}>🐄</span>}
                      </div>
                      <div style={{fontSize:9,color:active?"#777":"#bbb",marginTop:1}}>
                        {item.brand}{active && <span style={{color:"#aaa"}}> · {formatPortion(qty, item.unit)}</span>}
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0,minWidth:44}}>
                      {active
                        ? <><div style={{fontSize:16,fontWeight:900,color:"#fff"}}>{Math.round(item.cal*qty)}</div><div style={{fontSize:8,color:"#666"}}>cal</div></>
                        : <><div style={{fontSize:14,fontWeight:800,color:"#555"}}>{item.cal}</div><div style={{fontSize:8,color:"#bbb"}}>/{item.unit}</div></>
                      }
                    </div>
                    {item.addedSugar>=8 && <div style={{width:8,height:8,borderRadius:"50%",backgroundColor:C.added,flexShrink:0}}/>}
                    {item.addedSugar>=4 && item.addedSugar<8 && <div style={{width:8,height:8,borderRadius:"50%",backgroundColor:"#c4943a",flexShrink:0}}/>}
                    <div onClick={() => setExpandedNote(isOpen ? null : item.id)}
                         style={{width:22,height:22,borderRadius:"50%",flexShrink:0,
                                 backgroundColor:active?"#333":"#f0ede8",
                                 display:"flex",alignItems:"center",justifyContent:"center",
                                 fontSize:11,color:active?"#777":"#aaa",fontWeight:700,cursor:"pointer"}}>i</div>
                  </div>

                  {/* EXPANDED NOTE */}
                  {isOpen && (
                    <div style={{margin:"2px 0 4px 0",padding:"10px 12px",backgroundColor:"#1e1e1e",borderRadius:6,
                                 borderLeft:`3px solid ${item.hydrogenatedOil ? C.fat : item.processed>=2 ? "#d47333" : "#444"}`,
                                 fontSize:11,lineHeight:1.6,color:"#aaa"}}>
                      <div style={{marginBottom:8}}>{item.note}</div>
                      <div style={{fontSize:8,letterSpacing:1.5,textTransform:"uppercase",color:"#555",fontWeight:700,marginBottom:4}}>
                        MACRO BREAKDOWN (per {item.unit})
                      </div>
                      <MacroBar cal={item.cal} fat={item.fat} satFat={item.satFat} carbs={item.carbs}
                                fiber={item.fiber} sugar={item.sugar} addedSugar={item.addedSugar}
                                protein={item.protein} refinedCarbs={item.refinedCarbs} small={false}/>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:8,color:"#666",fontWeight:600,marginTop:6}}>
                        <span>{item.cal} cal</span>
                        <span>Na {item.sodium}mg</span>
                        {item.refinedCarbs>0 && <span style={{color:C.carbs}}>Refined starch {item.refinedCarbs}g</span>}
                        {item.caffeine>0      && <span style={{color:C.caffeine}}>Caffeine {item.caffeine}mg</span>}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {/* STICKY BOTTOM PANEL */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,backgroundColor:"#141414F8",backdropFilter:"blur(12px)",
                   maxWidth:720,margin:"0 auto",borderTop:"1px solid #2a2a2a",zIndex:100,
                   maxHeight:showPanel?"70vh":130,transition:"max-height 0.3s",overflowY:"auto"}}>
        {activeCount === 0 ? (
          <div style={{textAlign:"center",fontSize:12,color:"#555",padding:"16px 0"}}>Use +/− to add items</div>
        ) : (
          <div style={{padding:"10px 16px 14px"}}>

            {/* Summary — always visible */}
            <div onClick={() => setShowPanel(!showPanel)}
                 style={{cursor:"pointer",display:"flex",alignItems:"center",gap:12,marginBottom:showPanel?10:0}}>
              <div style={{width:42,height:42,borderRadius:8,backgroundColor:report.gradeColor,
                           display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <div style={{fontSize:22,fontWeight:900,color:"#fff",lineHeight:1}}>{report.grade}</div>
              </div>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                  <span style={{fontSize:10,color:report.gradeColor,fontWeight:700}}>{report.gradeLabel}</span>
                  <span style={{fontSize:9,color:"#555"}}>{showPanel ? "▼ collapse" : "▲ details"}</span>
                </div>
                <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                  <span style={{fontSize:26,fontWeight:900,color:"#fff",lineHeight:1}}>{Math.round(report.totals.cal)}</span>
                  <span style={{fontSize:10,color:"#555"}}>cal</span>
                  <span style={{fontSize:10,color:"#444",marginLeft:4}}>quality {report.score}/100</span>
                </div>
              </div>
            </div>

            {/* Expanded detail */}
            {showPanel && (
              <div style={{borderTop:"1px solid #2a2a2a",paddingTop:10}}>

                <div style={{fontSize:8,letterSpacing:1.5,textTransform:"uppercase",color:"#555",fontWeight:700,marginBottom:6}}>MACRO DISTRIBUTION</div>
                <MacroBar cal={report.totals.cal} fat={report.totals.fat} satFat={report.totals.satFat}
                          carbs={report.totals.carbs} fiber={report.totals.fiber} sugar={report.totals.sugar}
                          addedSugar={report.totals.addedSugar} protein={report.totals.protein}
                          refinedCarbs={report.totals.refinedCarbs} small={false}/>

                {report.flags.length > 0 && (
                  <div style={{marginTop:12,marginBottom:8}}>
                    <div style={{fontSize:8,letterSpacing:1.5,textTransform:"uppercase",color:"#555",fontWeight:700,marginBottom:6}}>WARNINGS</div>
                    {report.flags.map(f => (
                      <div key={f.key} style={{marginBottom:6}}>
                        <button onClick={() => setExpandedFlag(expandedFlag===f.key ? null : f.key)}
                                style={{border:"none",backgroundColor:`${f.color}15`,borderRadius:4,padding:"5px 10px",
                                        fontSize:10,fontWeight:700,color:f.color,cursor:"pointer",
                                        width:"100%",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span>⚠ {f.label}</span>
                          <span style={{fontSize:8,color:"#555"}}>{expandedFlag===f.key?"▼":"▶"} {f.items?.length||0} item{(f.items?.length||0)!==1?"s":""}</span>
                        </button>
                        {expandedFlag === f.key && (
                          <div style={{padding:"8px 10px",backgroundColor:"#1a1a1a",borderRadius:"0 0 4px 4px",borderLeft:`3px solid ${f.color}`}}>
                            <div style={{fontSize:10,color:"#888",marginBottom:6,lineHeight:1.5}}>{f.detail}</div>
                            {f.items && f.items.map((c, ci) => (
                              <div key={ci} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:6,paddingBottom:6,
                                                    borderBottom:ci<f.items.length-1?"1px solid #222":"none"}}>
                                <div style={{width:6,height:6,borderRadius:"50%",backgroundColor:f.color,marginTop:5,flexShrink:0,opacity:0.8}}/>
                                <div>
                                  <div style={{fontSize:11,fontWeight:700,color:"#ccc"}}>
                                    {c.name} <span style={{fontWeight:400,color:"#666"}}>×{c.qty}</span>
                                    {c.score>1 && <span style={{marginLeft:6,fontSize:8,backgroundColor:`${f.color}25`,color:f.color,padding:"1px 5px",borderRadius:2,fontWeight:800}}>severity {c.score}/3</span>}
                                  </div>
                                  <div style={{fontSize:9,color:"#777",lineHeight:1.5,marginTop:2}}>{c.reason}</div>
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}

                <div style={{fontSize:8,letterSpacing:1.5,textTransform:"uppercase",color:"#555",fontWeight:700,marginBottom:6,marginTop:10}}>WATCH THESE</div>
                {report.dangers.map(d => <MetricBar key={d.key} d={d}/>)}

                <div style={{fontSize:8,letterSpacing:1.5,textTransform:"uppercase",color:"#555",fontWeight:700,marginBottom:6,marginTop:10}}>WANT MORE OF</div>
                {report.positives.map(p => <MetricBar key={p.key} d={{...p, max:p.target}} isPositive={true}/>)}

              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
